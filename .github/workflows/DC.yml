name: Deploy Discord Proxy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start Proxy
        run: node server.js
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
